<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: white;
}

p.one {
  color: black;
  text-align: left;
  font-size: 60px;
  text-shadow: 2px 2px pink;
  font-family: serif;
  text-decoration: overline;
}

p.two {
  color: black;
  text-align: left;
  font-size: 40px;
  font-family: serif;
  font-style: italic;
  border: 1px solid black;
  outline: 3px solid yellow;
  font-weight: 600;
}

p.three {
  color: black;
  text-align: right;
  font-size: 20px;
  font-family: serif;
  text-decoration: underline;
  font-weight: bold;
  word-spacing: 1px;
  letter-spacing: 1px;
}

</style>
</head>
<body>

<p class="one">This is heading 1</p>
<p class="two">This is heading 2</p>
<p class="three">This is heading 3</p>

</body>
</html>
